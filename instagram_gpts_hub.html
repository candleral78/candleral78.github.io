<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인스타그램 AI 도구 모음</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #1c1c1e;
    min-height: 100vh;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    max-width: 480px;
    width: 100%;
  }

  /* 헤더 */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .insta-logo-main {
    width: 68px;
    height: 68px;
    margin: 0 auto 24px;
    display: block;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #ffffff;
    letter-spacing: -0.3px;
  }

  .header p {
    font-size: 13px;
    color: #aeaeb2;
    font-weight: 300;
    line-height: 1.8;
  }

  /* 섹션 타이틀 */
  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #636366;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* 링크 카드 */
  .link-card {
    display: flex;
    align-items: center;
    background: #2c2c2e;
    border: 1px solid #3a3a3c;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 10px;
    text-decoration: none;
    color: #fff;
    transition: all 0.2s ease;
  }

  .link-card:hover {
    background: #3a3a3c;
    border-color: #48484a;
    transform: translateY(-1px);
  }

  /* 카드 아이콘 - 인스타 로고 통일 */
  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    margin-right: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-text { flex: 1; }

  .step {
    font-size: 10px;
    font-weight: 600;
    color: #98989d;
    letter-spacing: 1px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 12px;
    color: #aeaeb2;
    font-weight: 300;
    line-height: 1.6;
  }

  .arrow {
    font-size: 20px;
    color: #636366;
    margin-left: 12px;
  }

  /* 푸터 */
  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11px;
    color: #48484a;
    line-height: 2;
  }

  .footer a {
    color: #636366;
    text-decoration: none;
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="container">

    <svg class="insta-logo-main" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">

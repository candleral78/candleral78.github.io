<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innovway AI Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #1c1c1e;
    min-height: 100vh;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
  }

  .container { max-width: 480px; width: 100%; }

  .header { text-align: center; margin-bottom: 48px; }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo-text span { color: #c0112f; }

  .logo-sub {
    font-size: 12px;
    color: #636366;
    letter-spacing: 3px;
    margin-top: 6px;
  }

  .header-desc {
    margin-top: 20px;
    font-size: 13px;
    color: #aeaeb2;
    font-weight: 300;
    line-height: 1.8;
  }

  .divider {
    border: none;
    border-top: 1px solid #2c2c2e;
    margin: 36px 0 24px;
  }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #48484a;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .link-card {
    display: flex;
    align-items: center;
    background: #2c2c2e;
    border: 1px solid #3a3a3c;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 10px;
    text-decoration: none;
    color: #fff;
    transition: all 0.2s ease;
  }

  .link-card:hover {
    background: #3a3a3c;
    border-color: #48484a;
    transform: translateY(-2px);
  }

  .link-card.coming {
    opacity: 0.45;
    cursor: default;
    pointer-events: none;
  }

  .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 16px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .card-text { flex: 1; }

  .card-category {
    font-size: 10px;
    font-weight: 600;
    color: #c0112f;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 12px;
    color: #aeaeb2;
    font-weight: 300;
    line-height: 1.5;
  }

  .card-count {
    font-size: 11px;
    color: #48484a;
    margin-top: 5px;
  }

  .arrow {
    font-size: 20px;
    color: #48484a;
    margin-left: 12px;
  }

  .footer {
    text-align: center;
    margin-top: 48px;
    font-size: 11px;
    color: #3a3a3c;
    line-height: 2;
  }

  @media (max-width: 480px) {
    .logo-text { font-size: 34px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-text">Innov<span>way</span></div>
    <div class="logo-sub">이노브웨이</div>
    <div class="header-desc">
      소상공인을 위한 AI 도구 모음입니다.<br>
      필요한 카테고리를 선택해 바로 사용해보세요.
    </div>
  </div>

  <hr class="divider">
  <div class="section-title">AI Tools</div>

  <!-- 인스타그램 -->
  <a class="link-card" href="instagram_gpts_hub.html">
    <div class="card-icon">
      <svg width="48" height="48" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ig" cx="30%" cy="107%" r="150%">
            <stop offset="0%" stop-color="#fdf497"/>
            <stop offset="5%" stop-color="#fdf497"/>
            <stop offset="45%" stop-color="#fd5949"/>
            <stop offset="60%" stop-color="#d6249f"/>
            <stop offset="90%" stop-color="#285AEB"/>
          </radialGradient>
        </defs>
        <rect width="120" height="120" rx="26" fill="url(#ig)"/>
        <rect x="14" y="14" width="92" height="92" rx="20" fill="none" stroke="#fff" stroke-width="6"/>
        <circle cx="60" cy="60" r="22" fill="none" stroke="#fff" stroke-width="6"/>
        <circle cx="88" cy="32" r="6" fill="#fff"/>
      </svg>
    </div>
    <div class="card-text">
      <div class="card-category">Instagram</div>
      <div class="card-title">인스타그램 AI 도구</div>
      <div class="card-desc">프로필 기획 · 사진 · 하이라이트 커버 제작</div>
      <div class="card-count">GPTs 2개</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <!-- 블로그 - 네이버 초록 N -->
  <div class="link-card coming">
    <div class="card-icon">
      <svg width="48" height="48" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <rect width="120" height="120" rx="26" fill="#03C75A"/>
        <text x="50%" y="58%" font-size="62" font-family="Arial Black, sans-serif" font-weight="900" fill="#fff" text-anchor="middle" dominant-baseline="middle">N</text>
      </svg>
    </div>
    <div class="card-text">
      <div class="card-category">Blog</div>
      <div class="card-title">블로그 AI 도구</div>
      <div class="card-desc">Coming Soon</div>
    </div>
    <div class="arrow">›</div>
  </div>

  <!-- 사진 - 파란 그라데이션 -->
  <div class="link-card coming">
    <div class="card-icon">
      <svg width="48" height="48" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="photo" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4facfe"/>
            <stop offset="100%" stop-color="#0052cc"/>
          </linearGradient>
        </defs>
        <rect width="120" height="120" rx="26" fill="url(#photo)"/>
        <rect x="16" y="30" width="88" height="66" rx="8" fill="none" stroke="#fff" stroke-width="5"/>
        <circle cx="60" cy="63" r="18" fill="none" stroke="#fff" stroke-width="5"/>
        <circle cx="60" cy="63" r="8" fill="#fff"/>
        <rect x="36" y="20" width="22" height="14" rx="4" fill="#fff"/>
        <circle cx="90" cy="44" r="4" fill="#fff"/>
      </svg>
    </div>
    <div class="card-text">
      <div class="card-category">Photo</div>
      <div class="card-title">사진 AI 도구</div>
      <div class="card-desc">Coming Soon</div>
    </div>
    <div class="arrow">›</div>
  </div>

  <!-- 영상 - 레드 그라데이션 -->
  <div class="link-card coming">
    <div class="card-icon">
      <svg width="48" height="48" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="video" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f5a623"/>
            <stop offset="100%" stop-color="#d4560a"/>
          </linearGradient>
        </defs>
        <rect width="120" height="120" rx="26" fill="url(#video)"/>
        <rect x="12" y="32" width="66" height="56" rx="8" fill="none" stroke="#fff" stroke-width="5"/>
        <polyline points="78,46 108,30 108,90 78,74" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
        <polygon points="36,48 36,72 58,60" fill="#fff"/>
      </svg>
    </div>
    <div class="card-text">
      <div class="card-category">Video</div>
      <div class="card-title">영상 AI 도구</div>
      <div class="card-desc">Coming Soon</div>
    </div>
    <div class="arrow">›</div>
  </div>

  <!-- 플레이스 - 네이버 초록 핀 -->
  <div class="link-card coming">
    <div class="card-icon">
      <svg width="48" height="48" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <rect width="120" height="120" rx="26" fill="#03C75A"/>
        <path d="M60 18 C40 18 24 34 24 54 C24 76 60 102 60 102 C60 102 96 76 96 54 C96 34 80 18 60 18Z" fill="#fff"/>
        <circle cx="60" cy="54" r="15" fill="#03C75A"/>
      </svg>
    </div>
    <div class="card-text">
      <div class="card-category">Place</div>
      <div class="card-title">플레이스 AI 도구</div>
      <div class="card-desc">Coming Soon</div>
    </div>
    <div class="arrow">›</div>
  </div>

  <div class="footer">
    <p>© 2026 Innovway · candleral78.github.io</p>
  </div>

</div>
</body>
</html>
